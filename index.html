<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Tracker Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --bg: #0b1210;
    --panel: #101a17;
    --panel-2: #16221e;
    --line: #22322c;
    --text: #e8f0ec;
    --muted: #7fa596;
    --accent: #35c98a;
    --accent-dim: #1f6b4c;
    --warn: #e2a03f;
    --danger: #e25c5c;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Arial, sans-serif;
    min-height:100vh;
  }
  header{
    padding:20px 28px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--danger);
    box-shadow:0 0 0 4px rgba(226,92,92,0.15);
    transition:.3s;
  }
  .brand .dot.live{
    background:var(--accent);
    box-shadow:0 0 0 4px rgba(53,201,138,0.18);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 4px rgba(53,201,138,0.18);}
    50%{box-shadow:0 0 0 8px rgba(53,201,138,0.06);}
  }
  .brand h1{font-size:17px;font-weight:600;margin:0;letter-spacing:.2px;}
  .brand span{font-size:12px;color:var(--muted);font-family:var(--mono);}
  .status-text{font-size:13px;color:var(--muted);font-family:var(--mono);}

  main{
    display:grid;
    grid-template-columns: 320px 1fr;
    gap:1px;
    background:var(--line);
    min-height:calc(100vh - 73px);
  }
  @media (max-width:820px){
    main{grid-template-columns:1fr;}
  }

  aside{
    background:var(--panel);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
    overflow-y:auto;
  }
  .card{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
  }
  .card .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.6px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .card .value{
    font-size:22px;
    font-family:var(--mono);
    font-weight:600;
  }
  .card .value.small{font-size:16px;}
  .grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .divider{
    border:none;
    border-top:1px solid var(--line);
    margin:6px 0;
  }
  .updated{
    font-size:12px;
    color:var(--muted);
    font-family:var(--mono);
  }
  .config-note{
    font-size:12px;
    color:var(--warn);
    line-height:1.6;
    background:rgba(226,160,63,0.08);
    border:1px solid rgba(226,160,63,0.3);
    border-radius:8px;
    padding:10px 12px;
  }
  .config-note code{
    background:rgba(0,0,0,0.25);
    padding:1px 5px;
    border-radius:4px;
    font-family:var(--mono);
  }

  #map{
    width:100%;
    height:100%;
    min-height:400px;
    background:#0e1614;
  }
  .leaflet-container{background:#0e1614;}

  .history-list{
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:180px;
    overflow-y:auto;
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
  }
  .history-list div{
    border-bottom:1px solid var(--line);
    padding-bottom:4px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot" id="live-dot"></div>
    <div>
      <h1>GPS Tracker Dashboard</h1>
      <span>ESP8266 + Neo-6M + Firebase</span>
    </div>
  </div>
  <div class="status-text" id="status-text">جاري الاتصال بقاعدة البيانات...</div>
</header>

<main>
  <aside>
    <div class="config-note" id="config-note">
      لازم تحط بيانات Firebase بتاعتك في أول ملف JavaScript (متغير <code>firebaseConfig</code>) قبل ما الداشبورد يشتغل فعليًا.
    </div>

    <div class="card">
      <div class="label">الموقع الحالي</div>
      <div class="value small" id="lat-lng">-- , --</div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="label">السرعة</div>
        <div class="value" id="speed">--</div>
      </div>
      <div class="card">
        <div class="label">الوقت</div>
        <div class="value small" id="heading">--</div>
      </div>
      <div class="card">
        <div class="label">الأقمار الصناعية</div>
        <div class="value" id="sats">--</div>
      </div>
      <div class="card">
        <div class="label">الارتفاع</div>
        <div class="value" id="alt">--</div>
      </div>
    </div>

    <hr class="divider">

    <div class="updated" id="last-updated">آخر تحديث: --</div>

    <hr class="divider">

    <div class="label" style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);">آخر القراءات</div>
    <div class="history-list" id="history"></div>
  </aside>

  <div id="map"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // ================== حط بيانات Firebase بتاعتك هنا ==================
  const firebaseConfig = {
    apiKey: "AIzaSyC5hinks-NQpC5E-Itb9_Yddzyo63ZPY0",
    authDomain: "gps-tracker-2b822.firebaseapp.com",
    databaseURL: "https://gps-tracker-2b822-default-rtdb.firebaseio.com",
    projectId: "gps-tracker-2b822",
    storageBucket: "gps-tracker-2b822.firebasestorage.app",
    messagingSenderId: "278545557855",
    appId: "1:278545557855:web:2d8e911701090e10f5eeea"
  };
  // =====================================================================

  const statusText = document.getElementById('status-text');
  const liveDot = document.getElementById('live-dot');
  const configNote = document.getElementById('config-note');

  let map, marker, path;
  const historyPoints = [];
  const MAX_HISTORY = 8;

  function initMap(lat, lng){
    map = L.map('map', { zoomControl: true }).setView([lat, lng], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);
    marker = L.circleMarker([lat, lng], {
      radius: 8,
      color: '#35c98a',
      fillColor: '#35c98a',
      fillOpacity: 0.9,
      weight: 2
    }).addTo(map);
    path = L.polyline([], { color: '#35c98a', weight: 3, opacity: 0.5 }).addTo(map);
  }

  function updateHistory(lat, lng, time){
    historyPoints.unshift({ lat, lng, time });
    if (historyPoints.length > MAX_HISTORY) historyPoints.pop();
    const el = document.getElementById('history');
    el.innerHTML = historyPoints.map(p =>
      `<div>${p.time} — ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</div>`
    ).join('');
  }

  function handleData(data){
    if (!data || data.latitude === undefined || data.longitude === undefined) return;

    const lat = parseFloat(data.latitude);
    const lng = parseFloat(data.longitude);
    if (isNaN(lat) || isNaN(lng)) return;

    if (!map) initMap(lat, lng);
    marker.setLatLng([lat, lng]);
    path.addLatLng([lat, lng]);
    map.panTo([lat, lng]);

    document.getElementById('lat-lng').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    document.getElementById('speed').textContent = data.speed !== undefined ? `${data.speed} كم/س` : '--';
    document.getElementById('heading').textContent = data.time !== undefined ? data.time : '--';
    document.getElementById('sats').textContent = data.satellites !== undefined ? data.satellites : '--';
    document.getElementById('alt').textContent = '--';

    const now = new Date();
    const timeStr = now.toLocaleTimeString('ar-EG');
    document.getElementById('last-updated').textContent = `آخر تحديث: ${timeStr}`;
    updateHistory(lat, lng, timeStr);

    liveDot.classList.add('live');
    statusText.textContent = 'متصل — بيانات مباشرة';
    configNote.style.display = 'none';
  }

  try {
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('GPS').on('value', (snapshot) => {
      handleData(snapshot.val());
    }, (error) => {
      statusText.textContent = 'فشل الاتصال — تأكد من إعدادات Firebase';
      liveDot.classList.remove('live');
      console.error(error);
    });
  } catch (e) {
    statusText.textContent = 'محتاج تحط بيانات Firebase الأول';
    console.error(e);
  }
</script>

</body>
</html>
